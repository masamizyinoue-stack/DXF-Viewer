<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DXF View v1</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--sb-bg:#0f1318;--topbar-bg:#0f1318;
  --accent:#2ecc71;--accent-2:#f39c12;
  --text:#e0e0e0;--text-dim:#888;--border:#2a3040;
}
body{display:flex;flex-direction:column;width:100vw;height:100vh;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:14px}
.topbar{height:62px;min-height:62px;background:var(--topbar-bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;padding:0 10px;position:relative;z-index:10;flex-shrink:0}
.logo-block{display:flex;flex-direction:column;align-items:flex-start;gap:1px;flex-shrink:0;padding:0 4px;max-width:150px;min-width:0}
.logo-text{font-size:17px;font-weight:700;color:var(--accent);line-height:1.2;white-space:nowrap}
.logo-sub{font-size:10px;color:var(--text-dim);white-space:nowrap}
.logo-top{display:flex;align-items:baseline;gap:4px}
.logo-file-area{display:flex;align-items:center;gap:2px;min-width:0;width:100%}
.logo-file-name{font-size:10px;color:#8ab4d0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;cursor:default;line-height:1.2;user-select:none}
.logo-file-nav{display:none;background:transparent;border:none;color:#8ab4d0;font-size:9px;padding:0 2px;cursor:pointer;line-height:1;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.tb-btn{width:44px;height:52px;border-radius:10px;flex-shrink:0;border:1px solid var(--border);
  background:transparent;color:var(--text);font-size:20px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tb-btn:active{background:rgba(255,255,255,.1)}
#settingsBtn{border-color:var(--accent);color:var(--accent);font-size:22px}
.tb-sep{width:1px;height:26px;background:var(--border);margin:0 3px;flex-shrink:0}
.tb-tool-btn{width:44px;height:52px;border-radius:9px;flex-shrink:0;border:1.5px solid rgba(70,90,120,0.5);background:transparent;color:var(--text);font-size:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tb-tool-label{font-size:9px;line-height:1;opacity:0.75;letter-spacing:0.02em;pointer-events:none}
.tb-tool-btn:active{background:rgba(255,255,255,.1)}
.tb-tool-btn.active{background:rgba(0,212,255,0.22);border-color:#00d4ff;color:#00d4ff}

.color-dot{width:22px;height:22px;border-radius:50%;display:block;border:2.5px solid rgba(255,255,255,.45)}
.stage{flex:1;position:relative;overflow:hidden;background:#000;min-height:0}
#cv,#ov{position:absolute;top:0;left:0;width:100%;height:100%}
#ac{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none} /* V0_82: Annotation専用Canvas */
#ov{pointer-events:all;cursor:crosshair;touch-action:none}
#noDrawingMsg{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:none;gap:14px}
#noDrawingMsg svg{opacity:.22}
.nd-text{color:#2e3f56;font-family:monospace;font-size:13px;letter-spacing:3px;font-weight:bold}
.btbar{display:none;position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;align-items:stretch;gap:4px;
  background:rgba(10,14,20,.92);border:1px solid rgba(42,48,64,.9);border-radius:20px;
  padding:8px 10px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 4px 24px rgba(0,0,0,.55);z-index:100}
.btbar-group{display:flex;gap:2px}
.btbar-sep{width:1px;background:var(--border);margin:4px 6px;border-radius:1px}
.bt-btn{width:62px;height:52px;border-radius:13px;border:1.5px solid transparent;
  background:transparent;color:var(--text);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  -webkit-tap-highlight-color:transparent;flex-shrink:0}
.bt-btn:active{background:rgba(255,255,255,.12)}
.bt-btn.active{background:rgba(46,204,113,.15);border-color:var(--accent)}
.bt-icon{font-size:20px;line-height:1}
.bt-label{font-size:10px;color:var(--text-dim);line-height:1}
.bt-btn.active .bt-label,.bt-btn.active .bt-icon{color:var(--accent)}
.viewmemo{position:absolute;top:10px;right:10px;z-index:100;
  display:grid;grid-template-columns:auto auto;gap:4px}
.viewmemo button{min-height:48px;min-width:52px;padding:4px 10px;font-size:12px;border:1px solid var(--border);
  border-radius:8px;background:rgba(10,14,20,.88);color:var(--text);cursor:pointer;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  -webkit-tap-highlight-color:transparent;white-space:nowrap;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  transition:all .15s ease}
.viewmemo .mem-btn{background:transparent;border:1.5px solid rgba(140,160,180,0.3);color:rgba(170,190,210,0.5);opacity:1;font-weight:normal}
.viewmemo .show-btn{background:transparent;border:1.5px solid rgba(140,160,180,0.3);color:rgba(170,190,210,0.5);opacity:1;font-weight:normal}
.viewmemo .mem-btn.vm-saved{background:rgba(0,212,255,0.12);border-color:#00d4ff;color:#00d4ff;font-weight:600;box-shadow:0 0 8px rgba(0,212,255,0.25)}
.viewmemo .show-btn.vm-saved{background:rgba(0,212,255,0.12);border-color:#00d4ff;color:#00d4ff;font-weight:600;box-shadow:0 0 8px rgba(0,212,255,0.25)}
.viewmemo .full-row{grid-column:1/-1;text-align:center} /* V0_74: 全体ボタン表示 */
.viewmemo .fit-btn{background:transparent;border:1.5px solid rgba(220,230,245,0.7);color:rgba(235,242,255,0.92);opacity:1;font-weight:normal} /* V0_76: 全体ボタン専用・白系 */
#snap-hint{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.82);color:var(--accent);font-size:12px;
  padding:6px 14px;border-radius:8px;pointer-events:none;display:none}
#settingsOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299}
body.settings-open #settingsOverlay{display:block}
#settingsPanel{position:fixed;left:0;top:0;bottom:0;width:300px;max-width:80vw;
  background:var(--sb-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;
  overflow-y:auto;z-index:300;transform:translateX(-110%);
  transition:transform .26s cubic-bezier(.4,0,.2,1)}
body.settings-open #settingsPanel{transform:translateX(0)}
.sp-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
  border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--sb-bg);z-index:1;flex-shrink:0}
.sp-title{font-size:17px;font-weight:600;color:var(--accent)}
.sp-close{width:36px;height:36px;border-radius:18px;border:1px solid var(--border);
  background:transparent;color:var(--text);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
#openFileBtnMain{display:flex;align-items:center;gap:12px;margin:14px 16px;padding:14px 16px;
  background:rgba(46,204,113,.08);border:1.5px solid var(--accent);border-radius:12px;
  color:var(--accent);font-size:15px;cursor:pointer;text-align:left;width:calc(100% - 32px);
  -webkit-tap-highlight-color:transparent}
#openFileBtnMain:active{background:rgba(46,204,113,.18)}
.sp-file-icon{font-size:26px;flex-shrink:0}
.sp-section{padding:12px 16px;border-top:1px solid var(--border)}
.sp-label{font-size:11px;color:var(--text-dim);margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.sp-row{display:flex;gap:8px;align-items:center}
.sp-toggle-btn{flex:1;padding:10px;border-radius:9px;font-size:14px;border:1.5px solid var(--border);
  background:transparent;color:var(--text);cursor:pointer;-webkit-tap-highlight-color:transparent}
.sp-toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(46,204,113,.1)}
.sp-input{width:100%;padding:10px 12px;border-radius:9px;font-size:16px;
  background:#1a1f26;border:1px solid var(--border);color:var(--text)}
.sp-page-btn{width:44px;height:44px;border-radius:9px;font-size:18px;
  border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer}
.sp-page-info{flex:1;text-align:center;color:var(--text-dim);font-size:15px}
.sp-action-btn{width:100%;padding:12px;border-radius:9px;font-size:14px;
  border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;text-align:center;
  -webkit-tap-highlight-color:transparent}
.sp-action-btn:active{background:rgba(255,255,255,.07)}
.sp-danger-btn{width:100%;padding:12px;border-radius:9px;font-size:14px;font-weight:600;
  border:1.5px solid #c0392b;background:rgba(192,57,43,.1);color:#e74c3c;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
.sp-danger-btn:active{background:rgba(192,57,43,.22)}
/* V0_143: #ver-labelはsp-header内spanのinline styleで完結。旧ブロック用ルールは削除 */
#colorOverlay{display:none;position:fixed;z-index:400;top:0;left:0;
  background:var(--sb-bg);border:1px solid var(--border);border-radius:16px;
  padding:14px 16px;min-width:252px;max-height:80vh;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.65);flex-direction:column;gap:14px}
#colorOverlay.open{display:flex}
.co-hl-colors{display:flex;gap:8px}
.hl-color-btn{width:34px;height:34px;border-radius:50%;border:3px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hl-color-btn.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
.co-hl-lw{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.hl-lw-btn{height:38px;border-radius:8px;font-size:14px;font-weight:600;
  border:1.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;
  -webkit-tap-highlight-color:transparent;min-width:0}
.hl-lw-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(46,204,113,.1)}
.co-dim-colors{display:flex;gap:7px;flex-wrap:wrap}
.dim-color-btn{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.dim-color-btn.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
.co-label{font-size:11px;color:var(--text-dim);margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.co-colors{display:flex;gap:8px}
.color-btn{width:38px;height:38px;border-radius:50%;border:3px solid transparent;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
.color-btn.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
.co-lw{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.lw-btn{height:40px;border-radius:8px;font-size:14px;font-weight:600;
  border:1.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;
  -webkit-tap-highlight-color:transparent;min-width:0}
.lw-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(46,204,113,.1)}
#layerModal{display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.7);align-items:center;justify-content:center}
#layerModal.open{display:flex}
.modal-box{background:var(--sb-bg);border:1px solid var(--border);border-radius:16px;
  padding:20px;min-width:300px;max-width:460px;max-height:80vh;display:flex;flex-direction:column;gap:10px}
.modal-box h3{color:var(--accent);font-size:16px}
#layerList{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.layer-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.layer-row input[type=checkbox]{accent-color:var(--accent);width:20px;height:20px}
.layer-color-box{width:16px;height:16px;border-radius:3px;border:1px solid #555;flex-shrink:0}
.modal-close-btn{padding:12px;border-radius:9px;font-size:15px;
  border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer}
@media (max-width:768px){.bt-btn{width:54px;height:50px}.lb-sub{display:none}}
@supports (padding-bottom:env(safe-area-inset-bottom)){
  .btbar{bottom:calc(22px + env(safe-area-inset-bottom))}}
.tb-btn svg, .tb-tool-btn svg { width: 20px; height: 20px; display: block; flex-shrink: 0; }
/* V0_71: コンテキスト感知色丸ボタン */
.tool-color-dot{width:24px;height:24px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.5);cursor:pointer;padding:0;flex-shrink:0;-webkit-tap-highlight-color:transparent;margin-left:4px}
.tool-color-dot:active{border-color:#fff}
/* colorOverlay モード別セクション表示制御 */
#colorOverlay .co-sketch-section,#colorOverlay .co-hl-section,#colorOverlay .co-dim-section{display:none}
#colorOverlay[data-mode="sketch"] .co-sketch-section{display:block}
#colorOverlay[data-mode="hl"] .co-hl-section{display:block}
#colorOverlay[data-mode="dim"] .co-dim-section{display:block}
/* V0_74: 計測グループラベル */
.dim-group{display:flex;align-items:center;flex-shrink:0}
.dim-group-label{font-size:9px;color:rgba(232,168,74,0.8);letter-spacing:0.5px;line-height:1;pointer-events:none;user-select:none}
.dim-group-btns{display:flex;align-items:center;gap:1px}
/* V0_98: 文字検索パネル */
#searchOverlay{display:none;position:fixed;inset:0;z-index:299}
#searchOverlay.open{display:block}
#searchBg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
#searchPanel{position:absolute;right:0;top:0;bottom:0;width:320px;max-width:85vw;background:var(--bg-panel);display:flex;flex-direction:column;overflow:hidden;z-index:1}
#searchInput{width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:16px;box-sizing:border-box;-webkit-appearance:none;outline:none}
#searchInput:focus{border-color:var(--accent)}
.search-result-item{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.07);cursor:pointer;font-size:14px;color:var(--text);word-break:break-all;-webkit-tap-highlight-color:rgba(0,212,255,.2)}
.search-result-item:active{background:rgba(0,212,255,.15)}
/* V0_100: 全図面検索 */
#allSearchOverlay{display:none;position:fixed;inset:0;z-index:300}
#allSearchOverlay.open{display:block}
#allSearchBg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
#allSearchPanel{position:absolute;right:0;top:0;bottom:0;width:340px;max-width:88vw;background:var(--bg-panel);display:flex;flex-direction:column;overflow:hidden;z-index:1}
#allSearchPanel .sp-header{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
#allSearchPanel .sp-title{font-size:15px;font-weight:600;color:var(--text);flex:1}
#allSearchPanel .sp-close{background:none;border:none;color:var(--text-dim,#6b7f99);font-size:20px;cursor:pointer;padding:2px 6px;line-height:1}
#allSearchInput{width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:16px;box-sizing:border-box;-webkit-appearance:none;outline:none}
#allSearchInput:focus{border-color:var(--accent)}
.asr-item{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;display:flex;flex-direction:column;gap:3px;-webkit-tap-highlight-color:rgba(0,212,255,.2)}
.asr-item:active{background:rgba(0,212,255,.12)}
/* V0_108: markPopup を全体ボタン左へ移動 */
#markFitRow{grid-column:1/-1;display:flex;gap:4px;align-items:stretch;}
#markFitRow #fitBtn{flex:1;}
#markPopup{display:none;min-height:48px;padding:4px 10px;font-size:12px;border:1.5px solid rgba(255,215,0,.75);border-radius:8px;background:rgba(10,14,20,.88);color:#ffd700;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 14px rgba(0,0,0,.5);user-select:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:center;justify-content:center;gap:4px;white-space:nowrap;flex-shrink:0;}
#markPopup.visible{display:flex;}
.asr-fname{font-size:13px;font-weight:600;color:#7cb8f5}
.asr-hit{font-size:12px;color:#d4e3f7;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#allSearchClearBtn{align-self:flex-end;font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--text-dim,#6b7f99);background:transparent;color:var(--text-dim,#6b7f99);cursor:pointer}
/* V0_101: フォルダ一括インデックス */
#folderIndexBtn{width:100%;padding:10px 0;border-radius:9px;border:none;background:var(--accent,#00d4ff);color:#000;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
#folderIndexBtn:active{opacity:.8}
#folderProgress{font-size:13px;color:var(--accent,#00d4ff);min-height:18px;text-align:center}
/* V0_107: タブバー */
#tabBar{display:flex;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;background:#0d1117;border-bottom:1px solid #2a3040;min-height:0;max-height:40px;flex-shrink:0}
#tabBar:empty{max-height:0;border-bottom:none}
.tab-item{display:flex;align-items:center;padding:0 6px 0 12px;min-width:80px;max-width:180px;height:40px;background:#0d1117;border-right:1px solid #2a3040;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;gap:4px;box-sizing:border-box}
.tab-item.active{background:#1a2535;border-bottom:2px solid var(--accent,#00d4ff)}
.tab-name{font-size:12px;color:#b0bec5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.tab-item.active .tab-name{color:#fff}
.tab-close{font-size:13px;color:#6b7f99;min-width:24px;min-height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;cursor:pointer;padding:0;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.tab-close:active{background:rgba(255,255,255,.15)}
</style>
</head>
<body>

<div class="topbar">
  <button class="tb-btn" id="settingsBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <div class="logo-block">
    <div class="logo-top">
      <span class="logo-text">DXF</span>
      <span class="logo-sub">Viewer</span>
    </div>
    <div class="logo-file-area">
      <div id="fileNameDisplay" class="logo-file-name" title="">---</div>
    </div>
  </div>
  <div class="tb-sep"></div>
  <button class="tool-color-dot" id="sketchColorDot" title="スケッチ色" style="display:none;background:rgb(255,0,0)"></button>
  <button class="tool-color-dot" id="hlColorDot" title="蛍光色" style="display:none;background:rgb(255,255,0);margin-right:8px"></button>
  <button class="tb-tool-btn tool-btn active" data-tool="sketch" title="スケッチ"><span class="tb-tool-label">ペン</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></button>

const APP_VERSION = 'V0_143';

// saveTimer → storage.js

// ERASER_RADIUS_PX → tool.js

// showGuide / hideGuide → ui.js


// =========================================================
// アノテーション描画 V0_82: #ac専用Canvas（CTM=identity）
// ワールド座標 → 物理ピクセル直接変換でzoom非依存
// =========================================================
function drawAnnotation(targetCtx) {
  var atc = targetCtx || actx;
  if (!atc) return;
  var dpr = window.devicePixelRatio || 1;
  // V0_85: 通常表示はPS=1固定。エクスポート時(targetCtx指定)のみ_pdfScaleを使用。
  // lineWidthからscale/zoom/pdfScaleを完全排除し画面上の線幅を常に固定する。
  var PS = 1;  // V0_89: annotationはscale/lwRef比率で自然スケールするためPS不要（PDF時も過剰増幅しない）
  // V0_87: ズーム比例lineWidth。fitScale基準でscaleに追従→DXF内容と同じ比率で拡縮。
  // lwRef=0防止。fitScaleが未設定(=1)の場合も安全に動作。
  var lwRef = (typeof fitScale !== 'undefined' && fitScale > 0) ? fitScale : scale;
  atc.clearRect(0, 0, atc.canvas.width, atc.canvas.height);
  // 座標・lineWidth 両方ともscaleに追従（DXF内容と同じ比率で拡縮）
  function physX(wx){ return (wx * scale + tx) * dpr; }
  function physY(wy){ return (-wy * scale + ty) * dpr; }

  // 保存済みストローク（Catmull-Rom風 midpoint quadratic bezier）
  // V0_119: ビューポートカリング（物理ピクセル空間で判定）
  const _mgPx=(atc.canvas.width>0?60*(window.devicePixelRatio||1):0);
  const _cwPx=atc.canvas.width, _chPx=atc.canvas.height;
  for(var si=0; si<strokes.length; si++){
    var s = strokes[si];
    if(!s.pts || s.pts.length < 2) continue;
    var _sxMn=Infinity,_sxMx=-Infinity,_syMn=Infinity,_syMx=-Infinity;
    for(var _pi=0;_pi<s.pts.length;_pi++){var _ppx=physX(s.pts[_pi].x),_ppy=physY(s.pts[_pi].y);if(_ppx<_sxMn)_sxMn=_ppx;if(_ppx>_sxMx)_sxMx=_ppx;if(_ppy<_syMn)_syMn=_ppy;if(_ppy>_syMx)_syMx=_ppy;}
    if(_sxMx<-_mgPx||_sxMn>_cwPx+_mgPx||_syMx<-_mgPx||_syMn>_chPx+_mgPx) continue;
    atc.save();
    if(s.hl){
      atc.globalAlpha = 0.45;
      atc.strokeStyle = 'rgb('+s.color.r+','+s.color.g+','+s.color.b+')';
      atc.lineWidth = s.lw * (scale / lwRef) * dpr * PS;  // V0_87: zoom比例
      atc.lineCap = 'round';
    } else {
      atc.globalAlpha = 1;
      atc.strokeStyle = 'rgb('+s.color.r+','+s.color.g+','+s.color.b+')'; // V0_94: 不透明
      atc.lineWidth = Math.max(dpr, s.lw * (scale / lwRef) * dpr * PS);  // V0_87: zoom比例・最小1px
      atc.lineCap = 'round';
    }
    atc.lineJoin = 'round';
    atc.beginPath();
    var spts = s.pts, n = spts.length;
    var px0 = physX(spts[0].x), py0 = physY(spts[0].y);
    if(n === 2){
      atc.moveTo(px0, py0);
      atc.lineTo(physX(spts[1].x), physY(spts[1].y));
    } else {
      var px1 = physX(spts[1].x), py1 = physY(spts[1].y);
      atc.moveTo((px0+px1)/2, (py0+py1)/2);
      for(var i=1; i<n-1; i++){
        var cx = physX(spts[i].x),   cy = physY(spts[i].y);
        var nx = physX(spts[i+1].x), ny = physY(spts[i+1].y);
        atc.quadraticCurveTo(cx, cy, (cx+nx)/2, (cy+ny)/2);
      }
      atc.lineTo(physX(spts[n-1].x), physY(spts[n-1].y));
    }
    atc.stroke();
    atc.restore();
  }

  // 描画中スケッチプレビュー
  if(sketching && sketchPts.length >= 2){
    atc.save();
    if(currentTool === 'hl'){
      atc.globalAlpha = 0.45;
      atc.strokeStyle = 'rgb('+currentHL_Color.r+','+currentHL_Color.g+','+currentHL_Color.b+')';
      atc.lineWidth = currentHL_LW * (scale / lwRef) * dpr * PS;  // V0_87: zoom比例
    } else {
      atc.globalAlpha = 1;
      atc.strokeStyle = 'rgb('+currentColor.r+','+currentColor.g+','+currentColor.b+')'; // V0_94: 不透明
      atc.lineWidth = Math.max(dpr, currentLW * (scale / lwRef) * dpr * PS);  // V0_87: zoom比例・最小1px
    }
    atc.lineCap = 'round';
    atc.lineJoin = 'round';
    atc.beginPath();
    var sp = sketchPts, sn = sp.length;
    var spx0 = physX(sp[0].x), spy0 = physY(sp[0].y);
    if(sn === 2){
      atc.moveTo(spx0, spy0);
      atc.lineTo(physX(sp[1].x), physY(sp[1].y));
    } else {
      var spx1 = physX(sp[1].x), spy1 = physY(sp[1].y);
      atc.moveTo((spx0+spx1)/2, (spy0+spy1)/2);
      for(var j=1; j<sn-1; j++){
        var scx = physX(sp[j].x),   scy = physY(sp[j].y);
        var snx = physX(sp[j+1].x), sny = physY(sp[j+1].y);
        atc.quadraticCurveTo(scx, scy, (scx+snx)/2, (scy+sny)/2);
      }
      atc.lineTo(physX(sp[sn-1].x), physY(sp[sn-1].y));
    }
    atc.stroke();
    atc.restore();
  }

}

// =========================================================

function drawOverlay(){
  const dpr=window.devicePixelRatio||1;
  // 物理ピクセルサイズで全クリア
  octx.clearRect(0,0,ov.width,ov.height);
  // dprスケールを設定
  octx.save();
  octx.scale(dpr,dpr);
  const W=ov.width/dpr, H=ov.height/dpr;
  // Images
  for(const img of images){
    const[sx,sy]=w2s(img.wx,img.wy);
    octx.drawImage(img.img,sx,sy,img.ww*scale,img.wh*scale);
    if(img===selectedImage){
      octx.strokeStyle='#2ecc71';octx.lineWidth=2;octx.setLineDash([4,4]);
      octx.strokeRect(sx,sy,img.ww*scale,img.wh*scale);
      octx.setLineDash([]);
      const hw=8;
      [[sx,sy],[sx+img.ww*scale,sy],[sx,sy+img.wh*scale],[sx+img.ww*scale,sy+img.wh*scale]].forEach(([hx,hy])=>{
        octx.fillStyle='#f39c12';octx.fillRect(hx-hw/2,hy-hw/2,hw,hw);
      });
    }
  }
  // Dims（V0_119: ビューポートカリング追加）
  {const _mgD=60;for(const d of dims){
    if(!d.lines||d.lines.length===0){drawDimEntity(octx,d);continue;}
    let _wxMn=Infinity,_wyMn=Infinity,_wxMx=-Infinity,_wyMx=-Infinity;
    for(const _l of d.lines){if(_l.x1<_wxMn)_wxMn=_l.x1;if(_l.x1>_wxMx)_wxMx=_l.x1;if(_l.y1<_wyMn)_wyMn=_l.y1;if(_l.y1>_wyMx)_wyMx=_l.y1;if(_l.x2<_wxMn)_wxMn=_l.x2;if(_l.x2>_wxMx)_wxMx=_l.x2;if(_l.y2<_wyMn)_wyMn=_l.y2;if(_l.y2>_wyMx)_wyMx=_l.y2;}
    if(d.tx!=null){if(d.tx<_wxMn)_wxMn=d.tx;if(d.tx>_wxMx)_wxMx=d.tx;}
    if(d.ty!=null){if(d.ty<_wyMn)_wyMn=d.ty;if(d.ty>_wyMx)_wyMx=d.ty;}
    const _sxMn=_wxMn*scale+tx,_sxMx=_wxMx*scale+tx;
    const _syMn=-_wyMx*scale+ty,_syMx=-_wyMn*scale+ty;
    if(_sxMx<-_mgD||_sxMn>W+_mgD||_syMx<-_mgD||_syMn>H+_mgD) continue;
    drawDimEntity(octx,d);
  }}
  // V0_82: Strokes/Sketch → drawAnnotation() (#ac専用Canvas) に移動
  // Dim guide
  if((currentTool==='dx'||currentTool==='dy'||currentTool==='dxdy'||currentTool==='diag')&&dimState.pts.length>0){
    octx.strokeStyle='#2ecc71';octx.lineWidth=1;octx.setLineDash([4,4]);
    for(let i=0;i<dimState.pts.length-1;i++){
      const[sx1,sy1]=w2s(dimState.pts[i].x,dimState.pts[i].y);
      const[sx2,sy2]=w2s(dimState.pts[i+1].x,dimState.pts[i+1].y);
      octx.beginPath();octx.moveTo(sx1,sy1);octx.lineTo(sx2,sy2);octx.stroke();
    }
    octx.setLineDash([]);
    for(const p of dimState.pts){
      const[sx,sy]=w2s(p.x,p.y);
      octx.beginPath();octx.arc(sx,sy,5,0,Math.PI*2);octx.fillStyle='#2ecc71';octx.fill();
    }
  }
  // Snap indicator (タイプ別マーカー)
  if(snapPt){
    const[sx,sy]=w2s(snapPt.x,snapPt.y);
    const STC={
      int:{col:'#ffd700',lbl:'交点'},
      end:{col:'#00ff7f',lbl:'端点'},
      cen:{col:'#00f0ff',lbl:'中心'},
      mid:{col:'#ffbb33',lbl:'中点'},
    };
    const sc=STC[snapPt.type]||{col:'#f39c12',lbl:''};
    octx.strokeStyle=sc.col;octx.fillStyle=sc.col;
    octx.lineWidth=2;octx.setLineDash([]);
    if(snapPt.type==='int'){
      // 交点: X + 中心点
      octx.beginPath();
      octx.moveTo(sx-10,sy-10);octx.lineTo(sx+10,sy+10);
      octx.moveTo(sx+10,sy-10);octx.lineTo(sx-10,sy+10);
      octx.stroke();
      octx.beginPath();octx.arc(sx,sy,3,0,Math.PI*2);octx.fill();
    } else if(snapPt.type==='end'){
      // 端点: 正方形 + クロスヘア
      octx.strokeRect(sx-7,sy-7,14,14);
      octx.beginPath();
      octx.moveTo(sx-12,sy);octx.lineTo(sx+12,sy);
      octx.moveTo(sx,sy-12);octx.lineTo(sx,sy+12);
      octx.stroke();
    } else if(snapPt.type==='cen'){
      // 中心: 円 + 内点 + クロスヘア
      octx.beginPath();octx.arc(sx,sy,9,0,Math.PI*2);octx.stroke();
      octx.beginPath();octx.arc(sx,sy,3,0,Math.PI*2);octx.fill();
      octx.beginPath();
      octx.moveTo(sx-13,sy);octx.lineTo(sx+13,sy);
      octx.moveTo(sx,sy-13);octx.lineTo(sx,sy+13);
      octx.stroke();
    } else if(snapPt.type==='mid'){
      // 中点: ひし形
      octx.beginPath();
      octx.moveTo(sx,sy-10);octx.lineTo(sx+10,sy);
      octx.lineTo(sx,sy+10);octx.lineTo(sx-10,sy);
      octx.closePath();octx.stroke();
    } else {
      octx.beginPath();octx.arc(sx,sy,8,0,Math.PI*2);octx.stroke();
      octx.beginPath();
      octx.moveTo(sx-11,sy);octx.lineTo(sx+11,sy);
      octx.moveTo(sx,sy-11);octx.lineTo(sx,sy+11);
      octx.stroke();
    }
    // ラベル
    if(sc.lbl){
      octx.font='bold 11px sans-serif';
      const tw=octx.measureText(sc.lbl).width;
      octx.fillStyle='rgba(0,0,0,0.72)';
      octx.fillRect(sx+15,sy-19,tw+8,17);
      octx.fillStyle=sc.col;
      octx.textAlign='left';octx.textBaseline='bottom';
      octx.fillText(sc.lbl,sx+19,sy-4);
    }
  }
  // dxdyツールのP3選択中: 方向プレビュー（V0_13改善）
  if((currentTool==='dxdy') && dimState.pts.length===2 && snapPt){
    const p1_=dimState.pts[0], p2_=dimState.pts[1];
    const midX=(p1_.x+p2_.x)/2, midY=(p1_.y+p2_.y)/2;
    const horizOfs=Math.abs(snapPt.x-midX);
    const vertOfs=Math.abs(snapPt.y-midY);

  }
  // Eraser
  if(eraserPos&&currentTool==='eraser'){
    const[sx,sy]=w2s(eraserPos.x,eraserPos.y);
    octx.strokeStyle='rgba(255,100,100,0.7)';octx.lineWidth=2;

  }

  if(dimState && dimState.pts && dimState.pts.length>=1){

    if(curPt){
      let prevDim = null;

          const[p1,p2,p3]=[dimState.pts[0],dimState.pts[1],curPt];
          const midX=(p1.x+p2.x)/2,midY=(p1.y+p2.y)/2;
          const pType=Math.abs(p3.y-midY)>=Math.abs(p3.x-midX)?'dx':'dy';
          prevDim=buildDim(p1,p2,p3,pType);
        } else if(currentTool==='diag' && dimState.pts.length===2){
          // P3 選択中: 斜め寸法P3プレビュー
          const[p1,p2,p3]=[dimState.pts[0],dimState.pts[1],curPt];
          prevDim=buildDim(p1,p2,p3,'diag');
        } else if(currentTool==='diag' && dimState.pts.length===1){
          // P2 選択中: 斜め寸法プレビュー
          const[p1,p2]=[dimState.pts[0],curPt];
          prevDim=buildDim(p1,p2,p2,'diag');
        } else if(currentTool==='dxdy' && dimState.pts.length===1){
          // P2 選択中: P1→カーソルの細線プレビュー
          const[sx0_,sy0_]=w2s(dimState.pts[0].x,dimState.pts[0].y);
          const[sx1_,sy1_]=w2s(curPt.x,curPt.y);
          octx.save();
          octx.strokeStyle='rgba(0,212,255,0.6)';
          octx.lineWidth=1;
          octx.setLineDash([4,3]);
          octx.beginPath();octx.moveTo(sx0_,sy0_);octx.lineTo(sx1_,sy1_);octx.stroke();
          octx.restore();
        }
      }catch(e){}
      if(prevDim){
        octx.save();
        octx.strokeStyle='rgba(0,212,255,0.75)';
        octx.fillStyle='rgba(0,212,255,0.85)';
        octx.lineWidth=1.5;
        octx.setLineDash([5,3]);
        octx.lineCap='round';
        for(const l of(prevDim.lines||[])){
          const[sx1_,sy1_]=w2s(l.x1,l.y1);
          const[sx2_,sy2_]=w2s(l.x2,l.y2);
          octx.beginPath();octx.moveTo(sx1_,sy1_);octx.lineTo(sx2_,sy2_);octx.stroke();
        }
        octx.setLineDash([]);
        // 矢印プレビュー（常時）
        for(const a of(prevDim.arrows||[])){
          const[sxa,sya]=w2s(a.x,a.y);
          octx.save();octx.translate(sxa,sya);octx.rotate(a.angle);
          octx.beginPath();octx.moveTo(0,0);octx.lineTo(-10,4);octx.lineTo(-10,-4);octx.closePath();octx.fill();octx.restore();
        }
        // 寸法値（常時表示・角度対応）
        const txt = prevDim.text||'';

        if(txt && ptx_!=null && pty_!=null){
          const[stx_,sty_]=w2s(ptx_,pty_);
          octx.save();
          octx.translate(stx_,sty_);
          if(prevDim.tangle) octx.rotate(prevDim.tangle);
          var _pvfs=getDimFontSize(prevDim,1); // V0_78
          octx.font='bold '+_pvfs+'px sans-serif';
          octx.textAlign='center';
          octx.textBaseline='bottom'; // V0_75: drawDimEntityと同一(bottom, -5px)
          const tw=octx.measureText(txt).width;
          octx.fillStyle='rgba(0,20,40,0.65)';
          octx.fillRect(-tw/2-3,-(_pvfs+5),tw+6,_pvfs);
          octx.fillStyle='rgba(0,212,255,0.85)';

        octx.restore();
      }
    }
  }
  // V0_98: 検索ハイライト点滅
  if(typeof _searchHighlight!=='undefined'&&_searchHighlight){
    var[_shx,_shy]=w2s(_searchHighlight.x,_searchHighlight.y);

function snapshot(){
  history.push({
    strokes:strokes.map(s=>({...s,pts:[...s.pts]})),
    dims:[...dims]
  });
  if(history.length>MAX_HISTORY)history.shift();
  redoStack=[];
  updateUndoRedo();
}
function undo(){
  if(!history.length)return;
  redoStack.push({strokes:strokes.map(s=>({...s,pts:[...s.pts]})),dims:[...dims]});
  const st=history.pop();strokes=st.strokes;dims=st.dims;
  // V0_140: undo後は新配列のためopenFiles[]に明示同期
  if(currentFileIdx>=0&&openFiles[currentFileIdx]){openFiles[currentFileIdx].strokes=strokes;openFiles[currentFileIdx].dims=dims;}
  scheduleOverlay();updateUndoRedo();scheduleSave();verify('Undo');
}
function redo(){
  if(!redoStack.length)return;
  history.push({strokes:strokes.map(s=>({...s,pts:[...s.pts]})),dims:[...dims]});
  const st=redoStack.pop();strokes=st.strokes;dims=st.dims;
  // V0_140: redo後は新配列のためopenFiles[]に明示同期
  if(currentFileIdx>=0&&openFiles[currentFileIdx]){openFiles[currentFileIdx].strokes=strokes;openFiles[currentFileIdx].dims=dims;}

}

// V0_78: 寸法文字サイズモード対応ヘルパー
function getDimFontSize(d, PS) {
  PS = PS || 1;
  // 作成時のワールドフォント高（保存済みorフォールバック）
  var worldH = (d && d.worldFontH) ? d.worldFontH : (17 / (scale || 1));
  if (dimensionTextMode === 'fixed') {
    // 作成時サイズ固定: ワールド座標基準でズームに比例して拡縮
    // → 図面上に描かれた文字のように、ズームアウトで小さく・ズームインで大きく
    return Math.max(4, worldH * scale) * PS * 1.5; // V0_97: 1.5倍
  }
  // auto（推奨）: DIM_TEXT_MIN/MAX_PXでクランプ → 常に読みやすいサイズを維持
  var px = Math.max(DIM_TEXT_MIN_PX, Math.min(DIM_TEXT_MAX_PX, worldH * scale));
  return px * PS;
}
// V0_94: 6と9のみで構成される数値はアンダーバーが必要（上下判別のため）
function needsUnderbar(str){
  var digits=(str||'').replace(/[^0-9]/g,'');
  return digits.length>0&&/^[69]+$/.test(digits);
}
function drawDimEntity(ctx,d){
  var PS=1; // V0_95: PDF時もPS=1固定（PSCALE倍しない）
  var col=d.color||'#f39c12';
  ctx.strokeStyle=col;ctx.fillStyle=col;
  // V0_89: 作成時サイズ固定モード時は線幅・矢印・オフセットもズームに比例させる
  var fixedRatio=1;
  if(dimensionTextMode==='fixed'&&d&&d.worldFontH){fixedRatio=(d.worldFontH*scale)/17;}
  ctx.lineWidth=1.5*PS*fixedRatio;ctx.setLineDash([]);
  for(const l of d.lines){
    const[sx1,sy1]=w2s(l.x1,l.y1);const[sx2,sy2]=w2s(l.x2,l.y2);
    ctx.beginPath();ctx.moveTo(sx1,sy1);ctx.lineTo(sx2,sy2);ctx.stroke();
  }
  var arrowLen=10*PS*fixedRatio,arrowW=4*PS*fixedRatio;
  for(const a of d.arrows){
    const[sx,sy]=w2s(a.x,a.y);
    ctx.save();ctx.translate(sx,sy);ctx.rotate(a.angle);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-arrowLen,arrowW);ctx.lineTo(-arrowLen,-arrowW);ctx.closePath();ctx.fill();ctx.restore();
  }
  if(d.text){
    const[sx,sy]=w2s(d.tx,d.ty);
    var fSize=getDimFontSize(d,PS); // V0_78: dimensionTextModeに応じたサイズ
    var gap=(dimensionTextMode==='fixed'?8:5)*PS*fixedRatio; // V0_97: fixed時8px（アンダーバー離隔確保）
    ctx.save();ctx.translate(sx,sy);ctx.rotate(d.tangle||0);
    ctx.font='bold '+fSize+'px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillStyle=col;
    ctx.fillText(d.text,0,-gap);
    // V0_94: 6・9のみの数値にアンダーバー（上下判別用）
    if(needsUnderbar(d.text)){
      var tw=ctx.measureText(d.text).width;
      ctx.beginPath();ctx.moveTo(-tw/2,-gap+2);ctx.lineTo(tw/2,-gap+2);
      ctx.lineWidth=Math.max(1*PS,fSize*0.07*PS);ctx.stroke();
    }
    ctx.restore();
  }
  // センターマーク（直径・半径寸法）
  if(d.centerMark){
    var[cmx,cmy]=w2s(d.centerMark.cx,d.centerMark.cy);
    var cml=8*PS*fixedRatio;
    ctx.strokeStyle=col;ctx.lineWidth=1*PS*fixedRatio;
    ctx.beginPath();ctx.moveTo(cmx-cml,cmy);ctx.lineTo(cmx+cml,cmy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cmx,cmy-cml);ctx.lineTo(cmx,cmy+cml);ctx.stroke();
  }
}

// =========================================================
// スナップ (優先度付き: 交点>端点>中心>中点)
// =========================================================
function lineIntersect(x1,y1,x2,y2,x3,y3,x4,y4){
  const d=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
  if(Math.abs(d)<1e-10) return null;
  const t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/d;
  const u=-((x1-x2)*(y1-y3)-(y1-y2)*(x1-x3))/d;
  if(t>=-1e-9&&t<=1+1e-9&&u>=-1e-9&&u<=1+1e-9)
    return{x:x1+t*(x2-x1),y:y1+t*(y2-y1)};
  return null;
}
function distToSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,len2=dx*dx+dy*dy;
  if(len2<1e-12) return Math.hypot(px-x1,py-y1);
  const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/len2));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}
function snapAt(wx,wy){
  if(!doc) return null;
  const sr=24/scale;
  const BN={int:sr*0.55,end:sr*0.35,ten:sr*0.40,cen:sr*0.20,mid:sr*0.05};
  let best=null,bestScore=sr;
  function check(x,y,type){
    if(!isFinite(x)||!isFinite(y)) return;
    const d=Math.hypot(x-wx,y-wy);
    if(d>sr) return;
    const score=d-(BN[type]||0);
    if(score<bestScore){bestScore=score;best={x,y,type};}
  }
  // キャッシュ+二分探索: X範囲を絞り込んでO(log n+m)で検索
  function checkArr(arr,type){
    const xlo=wx-sr;
    let lo=0,hi=arr.length;
    while(lo<hi){const m=(lo+hi)>>1;if(arr[m].x<xlo)lo=m+1;else hi=m;}
    for(let i=lo;i<arr.length&&arr[i].x<=wx+sr;i++){
      if(hiddenLayers.has(arr[i].layer)) continue;
      check(arr[i].x,arr[i].y,type);
    }
  }
  // キャッシュが空（レイヤ変更後など）なら再構築
  if(_scEndPts.length===0&&doc.sen.length>0) buildSnapCache();
  checkArr(_scEndPts,'end');
  checkArr(_scMidPts,'mid');
  checkArr(_scCenPts,'cen');
  // 交点: 付近の線分のみ（軽量モードで上限を抑える）
  const maxInt=perfMode?25:80;
  const near=doc.sen.filter(e=>!hiddenLayers.has(e.layer)&&distToSeg(wx,wy,e.x1,e.y1,e.x2,e.y2)<sr*1.5);
  const lim=Math.min(near.length,maxInt);
  outer:for(let i=0;i<lim;i++){
    for(let j=i+1;j<lim;j++){
      const a=near[i],b=near[j];
      const ix=lineIntersect(a.x1,a.y1,a.x2,a.y2,b.x1,b.y1,b.x2,b.y2);
      if(ix) check(ix.x,ix.y,'int');
      if(bestScore<-sr*0.2) break outer;
    }
  }
  // 点要素(POINT/ten)スナップ
  if(doc.ten){
    for(var _ti=0;_ti<doc.ten.length;_ti++){
      var _te=doc.ten[_ti];
      if(hiddenLayers.has(_te.layer)) continue;
      check(_te.x,_te.y,'ten');
    }
  }
  return best;
}

// =========================================================
// 寸法構築
// =========================================================
function buildDim(p1,p2,pArrow,type){
  const sd=parseFloat(document.getElementById('scaleDenom').value)||1;
  const lines=[],arrows=[];
  let text='',tx2=0,ty2=0,tangle=0;
  if(type==='dx'){
    const y=pArrow.y;
    lines.push({x1:p1.x,y1:p1.y,x2:p1.x,y2:y});
    lines.push({x1:p2.x,y1:p2.y,x2:p2.x,y2:y});
    lines.push({x1:p1.x,y1:y,x2:p2.x,y2:y});
    text=formatDim(Math.abs(p2.x-p1.x)/sd);
    const dir=p2.x>p1.x?0:Math.PI;
    arrows.push({x:p1.x,y,angle:Math.PI-dir});arrows.push({x:p2.x,y,angle:-dir});
    tx2=(p1.x+p2.x)/2;ty2=y;tangle=0;
  } else if(type==='dy'){
    const x=pArrow.x;
    lines.push({x1:p1.x,y1:p1.y,x2:x,y2:p1.y});
    lines.push({x1:p2.x,y1:p2.y,x2:x,y2:p2.y});
    lines.push({x1:x,y1:p1.y,x2:x,y2:p2.y});
    text=formatDim(Math.abs(p2.y-p1.y)/sd);
    const dir=p2.y>p1.y?Math.PI/2:-Math.PI/2;
    arrows.push({x,y:p1.y,angle:-dir+Math.PI});arrows.push({x,y:p2.y,angle:-dir});
    tx2=x;ty2=(p1.y+p2.y)/2;tangle=-Math.PI/2;
  } else {
    // diag: 斜め距離寸法。正確な幾何計算（オフセット寸法線＋補助線2本＋矢印2個）
    const dx=p2.x-p1.x,dy=p2.y-p1.y;
    const len=Math.hypot(dx,dy);
    if(len<1e-9) return null;
    const ux=dx/len,uy=dy/len;
    // 法線ベクトル（左90度）
    const nx2=-uy,ny2=ux;
    const midX=(p1.x+p2.x)/2,midY=(p1.y+p2.y)/2;
    // pArrow が未指定またはp2と同じ場合は法線方向50px先をデフォルト位置に
    const pRef=(pArrow&&(pArrow.x!==p2.x||pArrow.y!==p2.y))
      ?pArrow:{x:midX+nx2*50/scale,y:midY+ny2*50/scale};
    // p3のオフセット量（法線方向への射影）
    const offset2=(pRef.x-midX)*nx2+(pRef.y-midY)*ny2;
    // 寸法線端点
    const ep1x=p1.x+nx2*offset2,ep1y=p1.y+ny2*offset2;
    const ep2x=p2.x+nx2*offset2,ep2y=p2.y+ny2*offset2;
    // 補助線（寸法線外側に少しはみ出す）
    const ext2=8/scale;
    const sig2=offset2>=0?1:-1;
    const a1=Math.atan2(uy,-ux),a2=Math.atan2(-uy,ux);  // スクリーン空間: Y軸反転考慮
    text=formatDim(len/sd);
    tx2=pRef.x;ty2=pRef.y;
    // 寸法線方向角度（drawDimEntityのctx.rotateで使用）
    var screenAng=Math.atan2(-uy,ux);  // Y軸反転を考慮したスクリーン空間の角度
    // 文字が逆さにならないよう-90°〜90°の範囲に正規化
    tangle=(screenAng>Math.PI/2)?screenAng-Math.PI:(screenAng<-Math.PI/2)?screenAng+Math.PI:screenAng;
    lines.push({x1:ep1x,y1:ep1y,x2:ep2x,y2:ep2y});
    lines.push({x1:p1.x,y1:p1.y,x2:ep1x+nx2*sig2*ext2,y2:ep1y+ny2*sig2*ext2});
    lines.push({x1:p2.x,y1:p2.y,x2:ep2x+nx2*sig2*ext2,y2:ep2y+ny2*sig2*ext2});
    // 引出線: 寸法値が寸法線範囲外の場合、端点からpRefへ引出
    const tRef2=(pRef.x-p1.x)*ux+(pRef.y-p1.y)*uy;
    if(tRef2<-1/scale) lines.push({x1:ep1x,y1:ep1y,x2:pRef.x,y2:pRef.y});
    else if(tRef2>len+1/scale) lines.push({x1:ep2x,y1:ep2y,x2:pRef.x,y2:pRef.y});
    arrows.push({x:ep1x,y:ep1y,angle:a1});arrows.push({x:ep2x,y:ep2y,angle:a2});
  }
  return {lines,arrows,text,tx:tx2,ty:ty2,tangle,color:currentDimColor||'#f39c12',worldFontH:17/(scale||1),fixedTextPx:17}; // V0_78: テキストサイズモード用
}

function formatDim(d){
  // 小数第1位まで四捨五入。.0の場合は小数点ごと省略
  var v=Math.round(d*10)/10;
  return (v%1===0)?String(Math.round(v)):v.toFixed(1);
}

// ── B. 拡張スナップ（円-直線交点・円-円交点） ──────────────────────────
;(function(){
  var _origSnapAt=snapAt;
  window.snapAt=function(wx,wy){
    var base=_origSnapAt(wx,wy);
    if(!doc) return base;
    if(perfMode) return base; // V0_120: 大容量DXF時は拡張スナップをスキップ
    var extras=[];
    var sr=24/scale;
    var sen=doc.sen||[], enko=doc.enko||[];

    // 円-直線交点
    enko.forEach(function(c){
      if(hiddenLayers.has(c.layer)) return;
      sen.forEach(function(e){
        if(hiddenLayers.has(e.layer)) return;
        var pts=circLineIntersect(c.cx,c.cy,c.r,e.x1,e.y1,e.x2,e.y2,c.a1,c.a2);
        pts.forEach(function(p){
          var d=Math.hypot(wx-p.x,wy-p.y);
          if(d<sr) extras.push({x:p.x,y:p.y,type:'cxl',dist:d,onLine:e});
        });
      });
    });

    // 円-円交点
    for(var i=0;i<enko.length;i++){
      for(var j=i+1;j<enko.length;j++){
        var c1=enko[i],c2=enko[j];
        if(hiddenLayers.has(c1.layer)||hiddenLayers.has(c2.layer)) continue;
        var pts=circCircIntersect(c1.cx,c1.cy,c1.r,c2.cx,c2.cy,c2.r,c1.a1,c1.a2,c2.a1,c2.a2);
        pts.forEach(function(p){
          var d=Math.hypot(wx-p.x,wy-p.y);
          if(d<sr) extras.push({x:p.x,y:p.y,type:'cxc',dist:d});
        });
      }
    }

    if(extras.length===0) return base;
    extras.sort(function(a,b){return a.dist-b.dist;});
    var best=extras[0];
    if(!base || best.dist<Math.hypot(wx-base.x,wy-base.y)-0.5){
      return best;
    }
    return base;
  };

  function arcAngleOk(px,py,cx,cy,a1,a2){
    // フル円(a1=0,a2=360)は常にOK
    if(a1===0&&a2===360) return true;
    var ang=Math.atan2(py-cy,px-cx)*180/Math.PI;
    ang=((ang%360)+360)%360;
    if(a1<=a2) return ang>=a1&&ang<=a2;
    return ang>=a1||ang<=a2; // 折り返しアーク
  }
  function circLineIntersect(cx,cy,r,x1,y1,x2,y2,a1,a2){
    if(a1===undefined) a1=0;
    if(a2===undefined) a2=360;
    var dx=x2-x1,dy=y2-y1,fx=x1-cx,fy=y1-cy;
    var a=dx*dx+dy*dy,b=2*(fx*dx+fy*dy),c=fx*fx+fy*fy-r*r;

      var t=(-b+s*sd)/(2*a);
      if(t>=-0.001&&t<=1.001){
        var px=x1+t*dx,py=y1+t*dy;
        if(arcAngleOk(px,py,cx,cy,a1,a2)) res.push({x:px,y:py});
      }
    });
    return res;
  }

  function circCircIntersect(cx1,cy1,r1,cx2,cy2,r2,a1_1,a2_1,a1_2,a2_2){
    if(a1_1===undefined) a1_1=0; if(a2_1===undefined) a2_1=360;
    if(a1_2===undefined) a1_2=0; if(a2_2===undefined) a2_2=360;
    var dx=cx2-cx1,dy=cy2-cy1,d=Math.hypot(dx,dy);
    if(d>r1+r2+1e-9||d<Math.abs(r1-r2)-1e-9||d<1e-9) return [];
    var a=(r1*r1-r2*r2+d*d)/(2*d);
    var h2=r1*r1-a*a;
    if(h2<0) return [];
    var h=Math.sqrt(h2);
    var mx=cx1+a*dx/d,my=cy1+a*dy/d;
    var cands=(h<1e-9)?[{x:mx,y:my}]:[{x:mx+h*dy/d,y:my-h*dx/d},{x:mx-h*dy/d,y:my+h*dx/d}];
    return cands.filter(function(p){
      return arcAngleOk(p.x,p.y,cx1,cy1,a1_1,a2_1)&&arcAngleOk(p.x,p.y,cx2,cy2,a1_2,a2_2);
    });
  }
})();

function drawDIMOverlay(){
  var dpr=window.devicePixelRatio||1;
  octx.save();
  octx.scale(dpr,dpr);

  // circDim phase=0 時: 近傍の円をハイライト
  if(DIM.tool==='circDim'&&DIM.phase===0&&doc&&doc.enko){
    // ホバー中の最近傍円をオレンジハイライト（DIM.cur の有無に関わらず _hoverPos を使用）
    var _hp=DIM._hoverPos;
    if(_hp){
      var nearEnk=findNearestCircleEdge(_hp.x,_hp.y);
      if(nearEnk){
        var hsc=w2s(nearEnk.cx,nearEnk.cy);
        var hr=nearEnk.r*scale;
        octx.save();
        octx.strokeStyle='#FF8C00';  // オレンジ
        octx.lineWidth=3;
        octx.beginPath(); octx.arc(hsc[0],hsc[1],hr,0,Math.PI*2); octx.stroke();
        octx.restore();
      }
    }
  }

  // radDim phase=0 時: 近傍の円をシアンハイライト
  if(DIM.tool==='radDim'&&DIM.phase===0&&doc&&doc.enko){
    var _rhp=DIM._hoverPos;
    if(_rhp){
      var rNearEnk=findNearestCircleEdge(_rhp.x,_rhp.y);
      if(rNearEnk){
        var rhsc=w2s(rNearEnk.cx,rNearEnk.cy);
        var rhr=rNearEnk.r*scale;
        octx.save();
        octx.strokeStyle='#00ffcc';
        octx.lineWidth=2.5;
        octx.setLineDash([6,3]);
        octx.beginPath(); octx.arc(rhsc[0],rhsc[1],rhr,0,Math.PI*2); octx.stroke();
        octx.setLineDash([]);
        octx.restore();
      }
    }
  }

  // カーソル位置のスナップマーカー
  var snap=DIM.cur;
  if(snap){
    var sc=w2s(snap.x,snap.y);
    var snapType=snap.type||(snap.kind==='line'?'on_line':snap.kind==='arc'?'on_arc':null)||snap.type;
    drawExtSnapMarker(octx,sc[0],sc[1],snapType);
  }

  // 確定済み点のマーカー
  DIM.pts.forEach(function(p,idx){
    var sc=w2s(p.x,p.y);
    octx.fillStyle='#00d4ff'; octx.strokeStyle='#00d4ff';
    octx.lineWidth=2;
    octx.beginPath(); octx.arc(sc[0],sc[1],5,0,Math.PI*2); octx.fill();
    octx.font='bold 12px sans-serif'; octx.textAlign='left'; octx.textBaseline='bottom';
    octx.fillText('P'+(idx+1),sc[0]+8,sc[1]-2);
  });

  // フェーズ2: 位置指定プレビュー
  if(DIM.phase===2 && DIM.cur){
    drawDIMPreview(octx);
  }

  octx.restore();
}

function drawExtSnapMarker(ctx,sx,sy,type){
  var col=SNAP_COLORS[type]||SNAP_COLORS.default;
  ctx.save();
  ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=2;
  // cxl, cxc は既存と異なるマーカー形状
  if(type==='ten'){
    // 点要素: 二重円（小さな塗り円 + 外枠円）
    ctx.beginPath(); ctx.arc(sx,sy,8,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2); ctx.fill();
  } else if(type==='cxl'){
    ctx.beginPath();
    ctx.moveTo(sx-8,sy-8); ctx.lineTo(sx+8,sy+8);
    ctx.moveTo(sx+8,sy-8); ctx.lineTo(sx-8,sy+8);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2); ctx.stroke();
  } else if(type==='cxc'){
    ctx.beginPath(); ctx.arc(sx,sy,8,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2); ctx.fill();
  }
  // ラベル
  var lbl={ten:'点要素',cxl:'円-線交点',cxc:'円-円交点'}[type]||'';
  if(lbl){
    ctx.font='bold 11px sans-serif';
    var tw=ctx.measureText(lbl).width;
    ctx.fillStyle='rgba(0,0,0,0.72)';
    ctx.fillRect(sx+15,sy-19,tw+8,17);
    ctx.fillStyle=col;
    ctx.textAlign='left'; ctx.textBaseline='bottom';
    ctx.fillText(lbl,sx+19,sy-4);
  }
  ctx.restore();
}

function drawDIMPreview(ctx){
  var p3=DIM.cur;
  if(!p3) return;
  var prevDim=null;
  try{
    if(DIM.tool==='circDim'){
      if(DIM.pts.length>=1&&DIM.pts[0].ent){
        prevDim=buildCircDimPhi(DIM.pts[0].ent,p3);
      }
    } else if(DIM.tool==='radDim'){
      if(DIM.pts.length>=1&&DIM.pts[0].ent){
        prevDim=buildRadDim(DIM.pts[0].ent,p3);
      }
    }
  }catch(e){ console.warn('[DIM preview]',e); }
  if(!prevDim||!prevDim.lines) return;

  ctx.save();
  ctx.strokeStyle='rgba(0,212,255,0.75)';
  ctx.lineWidth=1.5; ctx.setLineDash([5,3]); ctx.lineCap='round';
  prevDim.lines.forEach(function(l){
    var s1=w2s(l.x1,l.y1),s2=w2s(l.x2,l.y2);
    ctx.beginPath(); ctx.moveTo(s1[0],s1[1]); ctx.lineTo(s2[0],s2[1]); ctx.stroke();
  });
  ctx.setLineDash([]);
  // 矢印プレビュー（circDim/radDim）
  if(prevDim.arrows){
    ctx.fillStyle='rgba(0,212,255,0.85)';
    prevDim.arrows.forEach(function(a){
      var sa=w2s(a.x,a.y);
      ctx.save();ctx.translate(sa[0],sa[1]);ctx.rotate(a.angle);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-10,4);ctx.lineTo(-10,-4);ctx.closePath();ctx.fill();ctx.restore();
    });
  }
  if(prevDim.text&&prevDim.tx!=null){
    var stx=w2s(prevDim.tx,prevDim.ty);
    var _pfs=getDimFontSize(prevDim,1); // V0_78
    ctx.font='bold '+_pfs+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom'; // V0_75: drawDimEntityと同一
    var tw=ctx.measureText(prevDim.text).width;
    ctx.fillStyle='rgba(0,20,40,0.65)';
    ctx.fillRect(stx[0]-tw/2-3,stx[1]-(_pfs+5),tw+6,_pfs);
    ctx.fillStyle='rgba(0,212,255,0.85)';
    ctx.fillText(prevDim.text,stx[0],stx[1]-5);
  }
  ctx.restore();
}

// ─ φ寸法構築 ────────────────────────────────────
function buildCircDimPhi(ent,p3){
  var cx=ent.cx,cy=ent.cy,r=ent.r;
  // p3方向の角度
  var ang=Math.atan2(p3.y-cy,p3.x-cx);
  var ux=Math.cos(ang),uy=Math.sin(ang);
  // 直径線の端点（円周上）
  var p1x=cx-r*ux,p1y=cy-r*uy; // p3と反対側
  var p2x=cx+r*ux,p2y=cy+r*uy; // p3に近い側
  var sd=parseFloat(document.getElementById('scaleDenom').value)||1;
  var ext=6/scale; // 補助線のはみ出し量
  // p3が円外にある場合は寸法線をp3まで延長
  var distP3=Math.hypot(p3.x-cx,p3.y-cy);
  var ep2x=(distP3>r+ext)?p3.x:p2x+ux*ext;
  var ep2y=(distP3>r+ext)?p3.y:p2y+uy*ext;
  // p3が円外の反対側延長もext分はみ出す
  var ep1x=p1x-ux*ext, ep1y=p1y-uy*ext;
  // スクリーン空間の角度: w2sがY軸反転するため atan2(-uy, ux) を使用
  var screenAng=Math.atan2(-uy,ux);
  var tangle=(screenAng>Math.PI/2)?screenAng-Math.PI:(screenAng<-Math.PI/2)?screenAng+Math.PI:screenAng;
  return{
    lines:[{x1:ep1x,y1:ep1y,x2:ep2x,y2:ep2y}],
    arrows:[{x:p1x,y:p1y,angle:screenAng+Math.PI},{x:p2x,y:p2y,angle:screenAng}],
    text:'φ'+formatDim(r*2/sd),
    tx:p3.x,ty:p3.y,tangle:tangle,type:'phi',worldFontH:17/(scale||1),color:currentDimColor||'#f39c12',
    centerMark:{cx:cx,cy:cy}
  };
}



function findEnkoAt(wx,wy){
  if(!doc||!doc.enko) return null;
  var best=null,bd=Infinity;
  doc.enko.forEach(function(e){
    var d=Math.abs(Math.hypot(wx-e.cx,wy-e.cy)-e.r);
    if(d<bd){bd=d;best=e;}
  });
  return bd<10/scale?best:null;
}

function findNearestCircleEdge(wx,wy){
  if(!doc||!doc.enko) return null;
  var THRESH=24/scale; // 円周から24px以内
  var best=null,bd=Infinity;
  doc.enko.forEach(function(e){
    if(hiddenLayers&&hiddenLayers.has(e.layer)) return;
    var distToEdge=Math.abs(Math.hypot(wx-e.cx,wy-e.cy)-e.r);
    if(distToEdge<THRESH&&distToEdge<bd){bd=distToEdge;best=e;}
  });
  return best;
}



function confirmDIM(p3){
  var p1=DIM.pts[0],p2=DIM.pts[1];
  var d=null;
  try{
    if(DIM.tool==='circDim'&&p1.ent){
      d=buildCircDimPhi(p1.ent,p3);
    } else if(DIM.tool==='radDim'&&p1&&p1.ent){
      d=buildRadDim(p1.ent,p3);
    }
  }catch(err){ console.warn('[DIM confirm]',err); }

  if(d){
    snapshot();
    dims.push(d);
    doSave(); scheduleDraw(); // V0_103: 即時保存
    showGuide('寸法を追加しました ↩ で取消', 2000);
  }
  // 次の寸法へ
  DIM.pts=[]; DIM.phase=0; DIM.cur=null;
  var nextGuide=DIM.tool==='circDim'?GUIDES.CIRC:GUIDES.RAD;
  setTimeout(function(){
    if(DIM.active) showGuide(nextGuide);
  },2000);
  scheduleOverlay();
}

// ─ R寸法構築 ────────────────────────────────────
function buildRadDim(ent,p3){
  var cx=ent.cx,cy=ent.cy,r=ent.r;
  var ang=Math.atan2(p3.y-cy,p3.x-cx);
  var ux=Math.cos(ang),uy=Math.sin(ang);
  var ex=cx+r*ux,ey=cy+r*uy; // 円周上の端点
  var sd=parseFloat(document.getElementById('scaleDenom').value)||1;
  var ext=6/scale; // 補助線のはみ出し量
  // p3が円外にある場合は半径線をp3まで延長
  var distP3=Math.hypot(p3.x-cx,p3.y-cy);
  var ep2x=(distP3>r+ext)?p3.x:ex+ux*ext;
  var ep2y=(distP3>r+ext)?p3.y:ey+uy*ext;
  // スクリーン空間の角度: w2sがY軸反転するため atan2(-uy, ux) を使用
  var screenAng=Math.atan2(-uy,ux);
  var tangle=(screenAng>Math.PI/2)?screenAng-Math.PI:(screenAng<-Math.PI/2)?screenAng+Math.PI:screenAng;
  return{
    lines:[{x1:cx,y1:cy,x2:ep2x,y2:ep2y}],
    arrows:[{x:ex,y:ey,angle:screenAng+Math.PI}], // 円周上で内向き（中心方向）
    text:'R'+formatDim(r/sd),
    tx:p3.x,ty:p3.y,tangle:tangle,type:'rad',worldFontH:17/(scale||1),color:currentDimColor||'#f39c12',
    centerMark:{cx:cx,cy:cy}
  };
}

// ─ window.DIM 公開（タッチ/マウス連携用） ──────────────────────
DIM.handleDown = function(sx, sy) {
  var wp = s2w(sx, sy);
  var snp = snapAt(wp[0], wp[1]);
  DIM.penDown = true;
  DIM.downSnapPt = snp;
  DIM.cur = snp || {x: wp[0], y: wp[1], type: 'default'};
  scheduleOverlay();
};

DIM.handleMove = function(sx, sy) {
  var wp = s2w(sx, sy);
  // _hoverPos は penDown 不要で常時更新（circDim ハイライト用）
  DIM._hoverPos = {x: wp[0], y: wp[1]};
  if (!DIM.penDown) { scheduleOverlay(); return; }
  var snp = snapAt(wp[0], wp[1]);
  DIM.cur = snp || {x: wp[0], y: wp[1], type: 'default'};
  scheduleOverlay();
};

DIM.handleUp = function(sx, sy) {
  if (!DIM.penDown) return;
  DIM.penDown = false;
  // プレビューと確定位置を一致させる: 最後のmoveで確定したDIM.curをそのまま使う
  // handleUpで再計算すると表示位置と異なるスナップが選ばれる可能性がある
  var pt = DIM.cur;
  if (!pt) {
    var wp = s2w(sx, sy);
    pt = {x: wp[0], y: wp[1], type: 'default'};
  }

  if (DIM.phase === 0) {
    var entry = {x: pt.x, y: pt.y, kind: 'pt'};
    if (DIM.tool === 'circDim') {
      var ent = null;
      if (pt.type === 'cen' && doc) ent = findEnkoAt(pt.x, pt.y);
      if (!ent) ent = findNearestCircleEdge(pt.x, pt.y);
      if (ent) {
        entry.kind = 'circ'; entry.ent = ent;
        entry.x = ent.cx; entry.y = ent.cy;
        DIM.pts = [entry]; DIM.phase = 2;
        showGuide(GUIDES.POS);
        DIM.cur = null; scheduleOverlay(); return;
      } else {
        showGuide('円の近くにペンを当ててください', 1500);
        DIM.cur = null; scheduleOverlay(); return;
      }
    }
    if (DIM.tool === 'radDim') {
      var rent_ = findNearestCircleEdge(pt.x, pt.y);
      if (rent_) {
        entry.kind = 'circ'; entry.ent = rent_;
        entry.x = rent_.cx; entry.y = rent_.cy;
        DIM.pts = [entry]; DIM.phase = 2;
        showGuide(GUIDES.POS);
        DIM.cur = null; scheduleOverlay(); return;
      } else {
        showGuide('円の近くにペンを当ててください', 1500);
        DIM.cur = null; scheduleOverlay(); return;
      }
    }
    DIM.pts = [entry]; DIM.phase = 1;
    showGuide(GUIDES.P2);
    DIM.cur = null; scheduleOverlay();

  } else if (DIM.phase === 1) {
    var entry2 = {x: pt.x, y: pt.y, kind: 'pt'};
    DIM.pts.push(entry2); DIM.phase = 2;
    showGuide(GUIDES.POS);
    DIM.cur = null; scheduleOverlay();

  } else if (DIM.phase === 2) {
    confirmDIM(pt);
  }
};

function computeFoot(line,pt){
  var dx=line.x2-line.x1,dy=line.y2-line.y1,len2=dx*dx+dy*dy;

  return {x:line.x1+t*dx,y:line.y1+t*dy};

// ─ 寸法構築 ─────────────────────────────────────────
function buildLinePtDim(line,pt,pArrow){
  var sd=parseFloat(document.getElementById('scaleDenom').value)||1;
  var dx=line.x2-line.x1,dy=line.y2-line.y1;
  var lineLen=Math.hypot(dx,dy);
  if(lineLen<1e-9) return null;
  var lux=dx/lineLen,luy=dy/lineLen;
  var foot=computeFoot(line,pt);
  var perpX=pt.x-foot.x,perpY=pt.y-foot.y;
  var dist=Math.hypot(perpX,perpY);
  if(dist<1e-9) return null;
  var ux=perpX/dist,uy=perpY/dist;
  var offset=(pArrow.x-foot.x)*lux+(pArrow.y-foot.y)*luy;
  var d1={x:foot.x+lux*offset,y:foot.y+luy*offset};
  var d2={x:pt.x  +lux*offset,y:pt.y  +luy*offset};
  var ext=8/scale,sig=offset>=0?1:-1;
  var lines=[
    {x1:foot.x,y1:foot.y,x2:d1.x+lux*sig*ext,y2:d1.y+luy*sig*ext},
    {x1:pt.x,  y1:pt.y,  x2:d2.x+lux*sig*ext,y2:d2.y+luy*sig*ext},
    {x1:d1.x,  y1:d1.y,  x2:d2.x,             y2:d2.y}
  ];
  var screenAng=Math.atan2(-uy,ux);
  var arrows=[
    {x:d1.x,y:d1.y,angle:screenAng+Math.PI},
    {x:d2.x,y:d2.y,angle:screenAng}
  ];
  var tx2=(d1.x+d2.x)/2,ty2=(d1.y+d2.y)/2;
  var tangle=(screenAng>Math.PI/2)?screenAng-Math.PI:(screenAng<-Math.PI/2)?screenAng+Math.PI:screenAng;
  var sd1=w2s(d1.x,d1.y),sd2=w2s(d2.x,d2.y);
  var pxLen=Math.hypot(sd2[0]-sd1[0],sd2[1]-sd1[1]);
  if(pxLen<60){
    var ref=(offset>=0?32:-32)/scale;
    tx2=d2.x+lux*ref; ty2=d2.y+luy*ref;
    lines.push({x1:d2.x,y1:d2.y,x2:tx2,y2:ty2});
  }
  return {lines,arrows,
    text:formatDim(dist/sd),
    tx:tx2,ty:ty2,tangle,worldFontH:17/(scale||1),color:currentDimColor||'#f39c12'};
}

function drawLPPreview(ctx2,dim){
  if(!dim) return;
  ctx2.strokeStyle=ctx2.fillStyle=dim.color||'#f39c12';
  ctx2.lineWidth=1.5; ctx2.setLineDash([5,4]);
  for(var i=0;i<dim.lines.length;i++){
    var l=dim.lines[i],s1=w2s(l.x1,l.y1),s2=w2s(l.x2,l.y2);
    ctx2.beginPath();ctx2.moveTo(s1[0],s1[1]);ctx2.lineTo(s2[0],s2[1]);ctx2.stroke();
  }
  ctx2.setLineDash([]);
  for(var j=0;j<dim.arrows.length;j++){
    var a=dim.arrows[j],sa=w2s(a.x,a.y);
    ctx2.save();ctx2.translate(sa[0],sa[1]);ctx2.rotate(a.angle);
    ctx2.beginPath();ctx2.moveTo(0,0);ctx2.lineTo(-10,4);ctx2.lineTo(-10,-4);
    ctx2.closePath();ctx2.fill();ctx2.restore();
  }
  if(dim.text){
    var st=w2s(dim.tx,dim.ty);
    ctx2.save();ctx2.translate(st[0],st[1]);ctx2.rotate(dim.tangle||0);
    var _lpfs=getDimFontSize(dim,1); // V0_78
    ctx2.font='bold '+_lpfs+'px sans-serif';ctx2.fillStyle=dim.color||'#f39c12';
    ctx2.textAlign='center';ctx2.textBaseline='bottom';
    ctx2.fillText(dim.text,0,-5); // V0_75: drawDimEntityと同一(-5px offset)
    ctx2.restore();
  }
}

function drawLPOverlay(){
  var dpr=window.devicePixelRatio||1;
  var ctx2=octx;
  ctx2.save(); ctx2.scale(dpr,dpr);

  // Phase0: _hoverLine をハイライト (再検索しない ─ 表示=確定を保証)
  if(LP.phase===0&&LP._hoverLine){

    ctx2.restore();
  }

  // 選択確定済み線ハイライト(Phase1,2)

    ctx2.save();
    ctx2.strokeStyle='#ff8c00'; ctx2.lineWidth=5; ctx2.setLineDash([]);
    ctx2.globalAlpha=0.9;
    ctx2.beginPath(); ctx2.moveTo(ls1[0],ls1[1]); ctx2.lineTo(ls2[0],ls2[1]); ctx2.stroke();
    ctx2.restore();
  }

  // Phase1: スナップ候補マーカー (LP.cur!=null の時のみ表示)
  if(LP.phase===1&&LP.cur){
    var sc=w2s(LP.cur.x,LP.cur.y);
    drawLPSnapMarker(ctx2,sc[0],sc[1],LP.cur.type||'default');
  }

  // Phase2: 選択済み点+垂点マーカー
  if(LP.selPt&&LP.phase===2){
    var spt=w2s(LP.selPt.x,LP.selPt.y);
    ctx2.save();
    ctx2.strokeStyle='#00ff7f'; ctx2.lineWidth=2; ctx2.setLineDash([]);
    ctx2.beginPath(); ctx2.arc(spt[0],spt[1],6,0,Math.PI*2); ctx2.stroke();
    if(LP.footPt){
      var sfp=w2s(LP.footPt.x,LP.footPt.y);
      ctx2.strokeStyle='#88ccff'; ctx2.lineWidth=1.5;
      ctx2.beginPath(); ctx2.arc(sfp[0],sfp[1],4,0,Math.PI*2); ctx2.stroke();
      ctx2.strokeStyle='rgba(255,140,0,0.35)'; ctx2.setLineDash([4,4]);
      ctx2.beginPath(); ctx2.moveTo(sfp[0],sfp[1]); ctx2.lineTo(spt[0],spt[1]); ctx2.stroke();
      ctx2.setLineDash([]);
    }
    ctx2.restore();
  }

  // Phase2: プレビュー
  if(LP.phase===2&&LP.cur&&LP.selLine&&LP.selPt){
    drawLPPreview(ctx2,buildLinePtDim(LP.selLine,LP.selPt,LP.cur));
  }

  ctx2.restore();
}

    if(LP._hoverLine){

    } else {
      var pt=LP.cur;
      LP.selPt=pt;
      LP.footPt=computeFoot(LP.selLine,pt);
      LP.phase=2; LP.cur=null;
      showGuide(LP_GUIDES.POS,0);
    }
  } else if(LP.phase===2){
    var wp=s2w(sx,sy);

    LP.selLine=null; LP.selPt=null; LP.footPt=null; LP.phase=0; LP.cur=null;

// V0_101: フォルダ一括インデックス ──────────────────────────────────
document.getElementById('folderIndexBtn').addEventListener('click', function(){
  document.getElementById('folderInput').click();
});
document.getElementById('folderInput').addEventListener('change', function(e){
  var files = Array.from(e.target.files).filter(function(f){
    return f.name.toLowerCase().endsWith('.dxf');
  });
  if(files.length === 0){
    document.getElementById('folderProgress').textContent = 'DXFファイルが見つかりません';
    return;
  }
  processFolderFiles(files);
  e.target.value = '';
});
function processFolderFiles(files){
  var prog = document.getElementById('folderProgress');
  var total = files.length;
  var done = 0;
  var errors = 0;
  prog.textContent = '準備中… (0 / ' + total + '件)';
  // 非同期で順番に処理
  function next(idx){
    if(idx >= total){
      prog.textContent = '完了: ' + (total - errors) + '件インデックス済み' + (errors > 0 ? '（' + errors + '件エラー）' : '');
      // 検索入力に値があれば再検索
      var inp = document.getElementById('allSearchInput');
      if(inp.value.trim()) doAllSearch();
      return;
    }
    var f = files[idx];
    prog.textContent = '処理中… ' + (idx + 1) + ' / ' + total + '件: ' + f.name;
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var buf = ev.target.result;
        var d = parseDXF(buf);
        var texts = [];
        if(d && d.moji){
          d.moji.forEach(function(m){
            var t = (m.text || '').trim();
            if(t) texts.push(t);
          });
        }
        _idbSave(f.name, buf, texts);
        done++;
      }catch(err){
        errors++;
        console.warn('[FolderIndex] ' + f.name + ':', err.message);
      }
      setTimeout(function(){ next(idx + 1); }, 0);
    };
    reader.onerror = function(){
      errors++;
      setTimeout(function(){ next(idx + 1); }, 0);
    };
    reader.readAsArrayBuffer(f);
  }
  next(0);
}

// V0_102: dim text drag ヘルパー（水・鉛/線と点 寸法値位置調整）
var _dimTextDrag=null;
function _dimTextHit(sx,sy){
  var r=26;
  for(var _dti=dims.length-1;_dti>=0;_dti--){
    var _dtd=dims[_dti];
    if(_dtd.tx===undefined||_dtd.ty===undefined) continue;
    var _dts=w2s(_dtd.tx,_dtd.ty);
    if(Math.hypot(sx-_dts[0],sy-_dts[1])<r) return _dti;
  }
  return -1;
}
function _dimTextDragMove(sx,sy){
  if(!_dimTextDrag) return false;
  var _dd=dims[_dimTextDrag.idx];
  if(!_dd){_dimTextDrag=null;return false;}
  if(!_dimTextDrag.moved&&Math.hypot(sx-_dimTextDrag.osx,sy-_dimTextDrag.osy)>5){
    snapshot();_dimTextDrag.moved=true;
  }
  if(_dimTextDrag.moved){
    var _wo=s2w(_dimTextDrag.osx,_dimTextDrag.osy);
    var _wn=s2w(sx,sy);
    _dd.tx=_dimTextDrag.otx+(_wn[0]-_wo[0]);
    _dd.ty=_dimTextDrag.oty+(_wn[1]-_wo[1]);
    scheduleOverlay();
  }
  return true;
}
function _dimTextDragUp(){
  if(!_dimTextDrag) return false;
  if(_dimTextDrag.moved) doSave(); // V0_103: 即時保存
  _dimTextDrag=null;
  return true;
}

(function(){
  var btn = document.getElementById('voiceSearchBtn');
  if(!btn) return;
  var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRec){
    btn.style.display='none'; // 非対応ブラウザでは非表示
    return;
  }
  var rec = new SpeechRec();
  rec.lang = 'ja-JP';
  rec.continuous = false;
  rec.interimResults = false;
  var listening = false;

  btn.addEventListener('click', function(){
    if(listening){ rec.stop(); return; }
    try{
      rec.start();
    }catch(e){}
  });

  rec.onstart = function(){
    listening = true;
    btn.textContent = '🔴';
    btn.title = '録音中（タップで停止）';
  };
  rec.onend = function(){
    listening = false;
    btn.textContent = '🎤';
    btn.title = '音声入力';
  };
  rec.onresult = function(e){
    var text = e.results[0][0].transcript;
    var inp = document.getElementById('allSearchInput');
    if(inp){ inp.value = text; inp.dispatchEvent(new Event('input')); }
  };
  rec.onerror = function(e){
    listening = false;
    btn.textContent = '🎤';
    showGuide('音声認識エラー: ' + e.error, 2000);
  };
})();
